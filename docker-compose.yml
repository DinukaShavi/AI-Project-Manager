version: '3.8'

services:
  db:
    image: pgvector/pgvector:16-pg16
    container_name: aitpm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-aitpm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aitpm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aitpm-network

  redis:
    image: redis:7-alpine
    container_name: aitpm-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aitpm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aitpm-backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres_secure_pass_123@db:5432/aitpm}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aitpm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aitpm-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - aitpm-network

volumes:
  postgres_data:
  redis_data:

networks:
  aitpm-network:
    name: aitpm-network
